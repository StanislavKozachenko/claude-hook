name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump version & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Configure git
        run: |
          git config user.name "Stanislav Kozachenko"
          git config user.email "stanislav.03@list.ru"

      - name: Bump version
        run: npm version ${{ github.event.inputs.bump }} --no-git-tag-version

      - name: Get new version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          get_section() {
            local prefix=$1
            if [ -n "$LAST_TAG" ]; then
              git log "${LAST_TAG}..HEAD" --pretty=format:"%s" \
                | grep -E "^${prefix}(\([^)]+\))?:" \
                | sed -E "s/^${prefix}(\([^)]+\))?: /- /" || true
            fi
          }

          ADDED=$(get_section "feat")
          FIXED=$(get_section "fix")

          {
            echo "## [${VERSION}] - ${DATE}"
            echo ""
            if [ -n "$ADDED" ]; then
              echo "### Added"
              echo ""
              echo "$ADDED"
              echo ""
            fi
            if [ -n "$FIXED" ]; then
              echo "### Fixed"
              echo ""
              echo "$FIXED"
              echo ""
            fi
            echo "---"
            echo ""
          } > /tmp/changelog-entry.md

          python3 - <<'PYEOF'
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()
          with open('/tmp/changelog-entry.md', 'r') as f:
              entry = f.read()
          idx = content.index('---\n') + 4
          content = content[:idx] + '\n' + entry + content[idx:]
          with open('CHANGELOG.md', 'w') as f:
              f.write(content)
          PYEOF

      - name: Create GitHub release
        run: gh release create "v${{ steps.version.outputs.value }}" --title "v${{ steps.version.outputs.value }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance

      - name: Open version bump PR
        run: |
          BRANCH="release/v${{ steps.version.outputs.value }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.value }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.value }}" \
            --body "Version bump after release v${{ steps.version.outputs.value }}." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
