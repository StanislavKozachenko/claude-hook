name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
      - run: npm test
      - run: npm run build

  changelog-check:
    name: CHANGELOG pre-check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for releasable commits since last tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+${LAST_TAG}..}HEAD"

          HAS=$(git log $RANGE --pretty=format:"%s" \
            | grep -qE "^(feat|fix|refactor|perf|docs|ci)(\([^)]+\))?:" && echo yes || echo no)

          if [ "$HAS" = "no" ]; then
            echo "::error::No releasable commits (feat/fix/refactor/perf/docs/ci) found since ${LAST_TAG:-the beginning}. The next release run would emit an empty CHANGELOG. Add at least one commit with a conventional prefix."
            exit 1
          fi

          echo "Releasable commits found since ${LAST_TAG:-the beginning} — release workflow will generate a non-empty CHANGELOG."
